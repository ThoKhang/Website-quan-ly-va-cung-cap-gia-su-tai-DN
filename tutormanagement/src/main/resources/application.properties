spring.application.name=tutormanagement
# ==============================================================
# C\u1ea4U H\u00ccNH K\u1ebeT N\u1ed0I C\u01a0 S\u1ede D\u1eee LI\u1ec6U SQL SERVER
# ==============================================================
# Thay "TenDatabaseCuaBan" b\u1eb1ng t\u00ean DB b\u1ea1n \u0111\u00e3 t\u1ea1o trong SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=QuanLyCungCapGiaSuDN;encrypt=true;trustServerCertificate=true;

# T\u00e0i kho\u1ea3n v\u00e0 m\u1eadt kh\u1ea9u \u0111\u0103ng nh\u1eadp SQL Server (th\u01b0\u1eddng m\u1eb7c \u0111\u1ecbnh l\u00e0 sa)
spring.datasource.username=sa
spring.datasource.password=123

# B\u1eaft bu\u1ed9c khai b\u00e1o Driver cho SQL Server
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==============================================================
# C\u1ea4U H\u00ccNH JPA & HIBERNATE (D\u00e0nh cho qu\u00e1 tr\u00ecnh ph\u00e1t tri\u1ec3n)
# ==============================================================
# Hi\u1ec3n th\u1ecb c\u00e2u l\u1ec7nh SQL tr\u00ean console \u0111\u1ec3 d\u1ec5 debug
spring.jpa.show-sql=true

# \u0110\u1ecbnh d\u1ea1ng c\u00e2u l\u1ec7nh SQL cho \u0111\u1eb9p d\u1ec5 \u0111\u1ecdc
spring.jpa.properties.hibernate.format_sql=true

# Quan tr\u1ecdng: "update" gi\u00fap Spring Boot t\u1ef1 \u0111\u1ed9ng t\u1ea1o/c\u1eadp nh\u1eadt b\u1ea3ng d\u1ef1a tr\u00ean Entity. 
# (N\u1ebfu b\u1ea1n \u0111\u00e3 ch\u1ea1y file script SQL t\u1ea1o b\u1ea3ng tay r\u1ed3i th\u00ec c\u00f3 th\u1ec3 \u0111\u1ed5i th\u00e0nh "none")
spring.jpa.hibernate.ddl-auto=update